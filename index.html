<html>
<body>
  <div class="top">
    
    <p class="button" id="playerScore">You: 0</p>
    <button
       onclick="getCards()"
       id="hit"
       type="submit" 
       class="button">
       Draw
    </button>
    <p class="button" id="suggestion">Draw to begin</p>
    <button
       id="stay"
       onclick= "resetForNow()"
       type="submit"
       class="button">
       Stand
    </button>
    <p class="button" id="dealerScore">Dealer: 0</p>
  </div>
  <div class=allCards>
    <div class = cards>
      <p class ="card" id="c1" ></p>
      <p class ="card" id="c2" ></p> 
      <p class ="card" id="c3" ></p>
      <p class ="card" id="c4" ></p>
      <p class ="card" id="c5" ></p>
      <p class ="card" id="c6" ></p>
      <p class ="card" id="c7" ></p>
      <p class ="card" id="c8" ></p>
      <p class ="card" id="c9" ></p>
      <p class ="card" id="c10" ></p>
      <p class ="card" id="c11" ></p>
    </div>
    <div class = Dcards>
      <p class ="card" id="Dc1" ></p>
      <p class ="card" id="Dc2" ></p>
      <p class ="card" id="Dc3" ></p>
      <p class ="card" id="Dc4" ></p>
      <p class ="card" id="Dc5" ></p>
      <p class ="card" id="Dc6" ></p>
      <p class ="card" id="Dc7" ></p>
      <p class ="card" id="Dc8" ></p>
      <p class ="card" id="Dc9" ></p>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
